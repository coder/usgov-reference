# Coder Grafana dashboards (generated upstream; locally adapted, see the note
# at the end of this header).
#
# Source: github.com/coder/observability  compiled/resources.yaml (the chart's
# rendered output). These are the six Prometheus-backed Coder dashboards. The
# selectors are already expanded for this deployment (namespace `coder`,
# pods `coder.*`), and every panel points at datasource uid `prometheus`, which
# the kube-prometheus-stack Grafana auto-provisions.
#
# The Grafana sidecar imports any ConfigMap labelled `grafana_dashboard: "1"`
# from any namespace, so these live in the `monitoring` namespace next to
# Grafana. Regenerate with deploy/observability/README.md instructions.
#
# The purely log-based `agent-boundaries` dashboard is intentionally omitted.
# The log-based panels in the workspaces, provisionerd, and workspace-detail
# dashboards reference datasource uid `loki`, which is backed by the in-cluster
# single-binary Loki + Promtail stack (deploy/observability/loki.yaml and
# promtail.yaml) through deploy/observability/loki-datasource.yaml, so those
# panels render live log data.
#
# Local adaptation: the `coder-status` dashboard's "Observability Tools" row was
# copied from the upstream coder/observability LGTM reference and checked
# components this demo does not run (distributed Loki read/write/backend/canary,
# Grafana Agent, config reloaders, Prometheus storage, CPU, RAM). That row was
# replaced with panels for what this stack actually runs: Prometheus, the
# single-binary Loki, and Promtail. The "Workspace Builds" and "Postgres"
# panels were likewise repointed to coderd_* metrics that exist in this stack.
---
