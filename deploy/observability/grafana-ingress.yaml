# Ingress for Grafana at grafana.<BASE_DOMAIN>.
#
# Same pattern as deploy/keycloak/ingress.yaml: TLS terminates upstream at the
# NLB (single ACM wildcard cert on the ingress-nginx controller Service). This
# Ingress declares only the plain-HTTP backend route. The Route53 `*` alias
# already resolves grafana.<BASE_DOMAIN> to the NLB.
#
# ssl-redirect is disabled because the controller receives plain HTTP from the
# NLB; leaving the default on would cause an HTTP->HTTPS redirect loop. The
# Grafana service created by the kube-prometheus-stack release is `kps-grafana`
# on port 80.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: <CLUSTER_NAME>
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.<BASE_DOMAIN>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kps-grafana
                port:
                  number: 80
