# Example k8s Secret manifests for the Coder control plane (namespace: coder).
#
# NOTE: these Secrets are now produced by the External Secrets Operator from
# AWS Secrets Manager (<CLUSTER_NAME>/coder/*). See
# docs/as-built/85-secrets-management.md. This file is kept only to document the
# Secret names and keys the control plane consumes.
#
# DO NOT COMMIT REAL SECRETS. Every value below is a REPLACE_ME placeholder.
# In the real deploy these Secrets are created by the platform layer
# (orchestrator) or applied out-of-band; this file documents the exact
# names/keys that deploy/coder/values.yaml expects so the two stay in sync.
#
# Apply (after `kubectl create namespace coder`) only if the platform layer
# has not already created them:
#   kubectl apply -n coder -f secrets.example.yaml   # AFTER replacing values
#
# Prefer creating them imperatively so secrets never touch git, e.g.:
#   kubectl create secret generic coder-db -n coder \
#     --from-literal=url='postgres://coder:PASSWORD@RDS_ENDPOINT:5432/coder?sslmode=require'
---
apiVersion: v1
kind: Secret
metadata:
  name: coder-db
  namespace: coder
type: Opaque
stringData:
  # Full PostgreSQL connection URL for the `coder` database on RDS.
  # Host: `terraform -chdir=terraform output -raw rds_endpoint` (host only).
  # User `coder` + its password: the platform db-init job creates the role;
  # the password is the one the platform stores in the `coder-db` Secret
  # (CONVENTIONS says key `password`). Assemble the URL from that password,
  # the RDS endpoint, port 5432, db `coder`. RDS enforces TLS, so sslmode=require.
  #
  #   postgres://coder:<password>@<rds_endpoint>:5432/coder?sslmode=require
  url: "postgres://coder:REPLACE_ME_DB_PASSWORD@REPLACE_ME_RDS_ENDPOINT:5432/coder?sslmode=require"
---
apiVersion: v1
kind: Secret
metadata:
  name: coder-oidc
  namespace: coder
type: Opaque
stringData:
  # Keycloak client secret for confidential client `coder` in realm `coder`
  # (Keycloak admin console: Clients > coder > Credentials). Owned by the
  # deploy/keycloak workstream; coordinate the value with them.
  client-secret: "REPLACE_ME_KEYCLOAK_CODER_CLIENT_SECRET"
---
apiVersion: v1
kind: Secret
metadata:
  name: coder-ai
  namespace: coder
type: Opaque
stringData:
  # Anthropic API key for the PRIMARY (anthropic-direct) AI Gateway provider.
  # Source: Anthropic Console (console.anthropic.com) > API Keys. Begins `sk-ant-`.
  # The Bedrock (SECONDARY) provider uses IRSA, so it needs NO key here.
  ANTHROPIC_API_KEY: "REPLACE_ME_sk-ant-xxxxxxxx"
---
apiVersion: v1
kind: Secret
metadata:
  name: coder-external-auth
  namespace: coder
type: Opaque
stringData:
  # Instance-wide GitLab OAuth application (Admin > Applications, or minted via
  # the GitLab Rails console). Redirect URI MUST be
  # https://dev.<BASE_DOMAIN>/external-auth/gitlab/callback and scopes
  # read_user/read_repository/write_repository. Consumed by the
  # CODER_EXTERNAL_AUTH_0_CLIENT_ID/SECRET env in values.yaml so git-in-workspaces
  # authenticates against the in-cluster GitLab (in-boundary) instead of github.com.
  gitlab-client-id: "REPLACE_ME_GITLAB_APP_ID"
  gitlab-client-secret: "REPLACE_ME_GITLAB_APP_SECRET"
