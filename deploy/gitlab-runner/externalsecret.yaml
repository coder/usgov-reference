# =============================================================================
# ExternalSecret: sync the GitLab Runner authentication token from AWS Secrets
# Manager into a Kubernetes Secret the gitlab-runner Helm chart consumes.
# =============================================================================
# Mirrors the repo-wide ESO pattern (deploy/platform/external-secrets): AWS
# Secrets Manager is the source of truth and ESO owns the Kubernetes Secret. No
# token value is ever committed to git.
#
# The ASM secret <CLUSTER_NAME>/gitlab/runner is created/rotated by
# scripts/setup-gitlab-ci-runners.py and holds JSON:
#
#   {
#     "runner-token": "glrt-...",        # GitLab runner authentication token
#     "runner-registration-token": ""    # unused (auth-token flow); key must
#                                         # exist because the chart projects it
#   }
#
# `dataFrom.extract` maps each JSON key to a key in the target Secret, so the
# Secret ends up with exactly the keys the chart's projected volume expects
# (runner-token + runner-registration-token). The Helm values reference this
# Secret via runners.secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-runner-auth
  namespace: gitlab-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: gitlab-runner-auth
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: <CLUSTER_NAME>/gitlab/runner
