# ExternalSecret: sync the Kiali OIDC client secret from AWS Secrets Manager into
# the Kubernetes Secret that Kiali reads for OpenID login.
#
# scripts/setup-kiali-oidc.py stores the confidential client secret in ASM at
# <CLUSTER_NAME>/observability/kiali-oauth as JSON {"oidc-secret": "<secret>",
# "signing-key": "<32-byte key>"}. ESO (ClusterSecretStore aws-secretsmanager,
# authenticated via the controller's IRSA ServiceAccount) extracts that JSON into
# a Secret named `kiali` in istio-system. dataFrom.extract maps each JSON key to a
# Secret key verbatim, so the resulting Secret carries `oidc-secret` (the OIDC
# client secret, mounted at /kiali-secret) and `signing-key` (the session token
# signing key, mounted at /kiali-override-secrets/login-token-signing-key via the
# login_token.signing_key="secret:kiali:signing-key" reference in
# kiali-server-values.yaml). Both are exactly what Kiali v2.26 OpenID expects.
#
# ASM is the source of truth; ESO owns this Secret and refreshes it hourly. No
# secret value is committed to git. This mirrors the grafana-oauth / gitlab-oidc
# ExternalSecrets in deploy/platform/external-secrets/.
#
# Apply this (and run setup-kiali-oidc.py first so the ASM secret exists) before
# rolling Kiali onto the openid auth strategy.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kiali-oauth
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: <CLUSTER_NAME>
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: kiali
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: <CLUSTER_NAME>/observability/kiali-oauth
