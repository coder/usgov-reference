---
# EXAMPLE ONLY. Copy to a real, untracked file, replace REPLACE_ME, and apply.
# NOTE: this Secret is now produced by the External Secrets Operator from AWS
# Secrets Manager (<CLUSTER_NAME>/gitlab/secrets). See
# docs/as-built/85-secrets-management.md. This file documents the key only.
# Do NOT commit a real password. This Secret holds ONLY the initial root
# password, which GitLab consumes on its first boot to seed the "root" user.
#
#   kubectl -n gitlab create secret generic gitlab-secrets \
#     --from-literal=initial_root_password='<a-strong-password>'
#
# Notes:
# - Must be at least 8 characters (GitLab rejects weak/short passwords).
# - Applied/changed AFTER first boot, this value is ignored: the password then
#   lives in the database. Change it via the GitLab UI or a Rails console instead.
# - This is unrelated to GitLab's internally generated /etc/gitlab/gitlab-secrets.json
#   (DB encryption keys), which GitLab creates itself and we persist on the
#   etc-gitlab PVC. Different thing, similar name.
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-secrets
  namespace: gitlab
  labels:
    app: gitlab
type: Opaque
stringData:
  initial_root_password: REPLACE_ME
