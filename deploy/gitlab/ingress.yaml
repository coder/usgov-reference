---
# GitLab Ingress. TLS is terminated upstream at the NLB with the shared ACM cert,
# so there is NO tls: block here and traffic to the backend is plain HTTP.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitlab
  namespace: gitlab
  labels:
    app: gitlab
  annotations:
    # Allow arbitrarily large bodies: git pushes, LFS objects, CI artifacts,
    # container/registry uploads. "0" disables the limit.
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    # Long-running git/HTTP operations and web-terminal/websocket streams.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # TLS is terminated at the NLB; ingress-nginx receives plain HTTP, so do not
    # force an HTTPS redirect here (it would loop). GitLab itself emits https URLs
    # via X-Forwarded-Proto (see statefulset.yaml).
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: gitlab.<BASE_DOMAIN>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab
                port:
                  number: 80
