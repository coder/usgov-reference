# EXAMPLE secrets for Keycloak. DO NOT COMMIT REAL VALUES.
#
# NOTE: these Secrets are now produced by the External Secrets Operator from
# AWS Secrets Manager (<CLUSTER_NAME>/keycloak/*). See
# docs/as-built/85-secrets-management.md. This file documents the keys only.
#
# Per deploy/CONVENTIONS.md the platform layer normally provisions the app DB
# Secret (`<app>-db`). These manifests document the exact keys this workstream
# expects so the Deployment can be applied standalone for testing. Replace every
# REPLACE_ME and apply into the `keycloak` namespace.
#
# Create real secrets without committing them, e.g.:
#   kubectl -n keycloak create secret generic keycloak-db \
#     --from-literal=username=keycloak \
#     --from-literal=password='<rds keycloak role password>'
#   kubectl -n keycloak create secret generic keycloak-admin \
#     --from-literal=username=admin \
#     --from-literal=password='<bootstrap admin password>'
#
# NOTE: two more placeholders live in realm-coder.json (not k8s Secrets):
#   - the `coder` client secret  -> must equal Secret `coder-oidc` (deploy/coder)
#   - the `demo` user password
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: <CLUSTER_NAME>
type: Opaque
stringData:
  # CONVENTIONS guarantees the `password` key. `username` is the logical role
  # the orchestrator's db-init job creates for the `keycloak` database.
  username: REPLACE_ME
  password: REPLACE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: <CLUSTER_NAME>
type: Opaque
stringData:
  # Initial bootstrap admin. Consumed only on first start against an empty DB.
  username: REPLACE_ME
  password: REPLACE_ME
