# Ingress for Keycloak at auth.<BASE_DOMAIN>.
#
# TLS is terminated upstream at the NLB (single ACM cert, configured on the
# ingress-nginx controller Service by the platform layer). This Ingress declares
# only the plain-HTTP backend route, per deploy/CONVENTIONS.md.
#
# ssl-redirect is disabled because the controller receives plain HTTP from the
# NLB; leaving the default on would cause an HTTP->HTTPS redirect loop. The
# larger proxy buffer accommodates Keycloak's sizable auth cookies/headers.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: <CLUSTER_NAME>
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
spec:
  ingressClassName: nginx
  rules:
    - host: auth.<BASE_DOMAIN>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
