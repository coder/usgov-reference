# Grants the Coder control-plane ServiceAccount (coder/coder) permission to
# manage workspace pods and PVCs in the coder-workspaces namespace. The Helm
# chart's serviceAccount.workspacePerms only creates this Role in the release
# namespace (coder); workspaces in coder-templates/claude-code/ run in
# coder-workspaces, so the same permissions are replicated here.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: coder-workspace-perms
  namespace: coder-workspaces
  labels:
    app.kubernetes.io/part-of: <CLUSTER_NAME>
rules:
  - apiGroups: [""]
    resources: ["pods", "persistentvolumeclaims"]
    verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coder-workspace-perms
  namespace: coder-workspaces
  labels:
    app.kubernetes.io/part-of: <CLUSTER_NAME>
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: coder-workspace-perms
subjects:
  - kind: ServiceAccount
    name: coder
    namespace: coder
