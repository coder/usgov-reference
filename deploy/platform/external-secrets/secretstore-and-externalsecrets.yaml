# =============================================================================
# ClusterSecretStore + ExternalSecrets: sync <CLUSTER_NAME>/* from AWS Secrets
# Manager into the app namespaces' Kubernetes Secrets.
# =============================================================================
# The ClusterSecretStore authenticates to ASM via the ESO controller's IRSA
# ServiceAccount (external-secrets/external-secrets), so no static AWS keys.
# Each ExternalSecret extracts the JSON keys of one ASM secret into a target
# Kubernetes Secret with the SAME name/keys the apps already reference, so the
# control-plane manifests (deploy/coder, deploy/keycloak, deploy/gitlab) are
# unchanged. ASM is the source of truth; ESO owns these Secrets and refreshes
# them hourly.
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-gov-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: coder-db
  namespace: coder
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: coder-db
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: <CLUSTER_NAME>/coder/db
---
