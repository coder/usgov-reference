name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Minimal read-only permissions for all jobs. Individual jobs may declare
# additional permissions only when strictly required (e.g., gitleaks needs
# security-events: write for SARIF upload on public repos).
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: gitleaks
  # Scans the working tree for generic secret patterns (API keys, tokens,
  # private keys, credentials) using the gitleaks binary directly. The
  # gitleaks-action wrapper requires a paid license for organization-owned
  # repositories; the binary itself is MIT-licensed and free, so it is used
  # here instead.
  #
  # Action SHA pins: update these periodically or via Dependabot.
  #   actions/checkout  v4  -> 34e114876b0b11c390a56381ad16ebd13914f8d5
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pin: actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          sudo tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks dir . --no-banner --redact --exit-code 1

  # ---------------------------------------------------------------------------
  # Job 2: check-identifiers
  # Runs scripts/check-identifiers.sh which detects classes of real AWS
  # environment identifiers by regex pattern (account IDs in ARN/ECR
  # contexts, AWS resource IDs, ACM cert UUIDs, optional base domain).
  # No literal live-env values are embedded in the script or this workflow.
  # ---------------------------------------------------------------------------
  check-identifiers:
    name: Identifier pattern scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pin: actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Make scanner executable
        run: chmod +x scripts/check-identifiers.sh

      - name: Run identifier scan
        run: bash scripts/check-identifiers.sh "$GITHUB_WORKSPACE"

  # ---------------------------------------------------------------------------
  # Job 3: yamllint
  # Static YAML syntax and style check on all YAML files in the repository.
  # ---------------------------------------------------------------------------
  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pin: actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install yamllint
        run: pip install yamllint --quiet

      - name: Run yamllint
        # Configuration lives in the repo-root .yamllint file.
        run: yamllint .
