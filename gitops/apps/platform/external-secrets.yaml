# Application: external-secrets (operator)
#
# Manages the External Secrets Operator Helm release (chart 2.6.0).
# Uses Argo CD multi-source: chart from the external-secrets Helm repo
# plus values from this git repo via the $values reference.
#
# This Application owns the operator Deployment and its CRDs
# (ExternalSecret, ClusterSecretStore, etc.). It does NOT own the
# ClusterSecretStore CR or the ExternalSecret CRs; those are managed by
# the separate secrets/secretstore-externalsecrets Application. Keeping
# them in separate Applications prevents dual CRD ownership and enforces
# the correct sync order: operator (and CRDs) must be healthy before the
# CRs Application is synced.
#
# ServerSideApply=true is required: ESO CRDs are large and exceed the
# client-side last-applied-configuration annotation size limit. SSA avoids
# apply failures and is required on future upgrades.
#
# Manual sync only; prune and selfHeal are OFF.
# NO metadata.finalizers.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: platform

  sources:
    - repoURL: "https://charts.external-secrets.io"
      chart: external-secrets
      targetRevision: "2.6.0"
      helm:
        releaseName: external-secrets
        valueFiles:
          - "$values/deploy/platform/external-secrets/values.yaml"

    - repoURL: "http://gitlab.gitlab.svc.cluster.local/<GITLAB_GROUP>/<CLUSTER_NAME>.git"
      targetRevision: main
      ref: values

  destination:
    server: "https://kubernetes.default.svc"
    namespace: external-secrets

  syncPolicy:
    # Manual sync only; prune and selfHeal are OFF.
    syncOptions:
      - CreateNamespace=true
      # ServerSideApply for CRD-bearing chart (ESO CRDs are large and
      # exceed the client-side annotation limit). Replace=false implied.
      - ServerSideApply=true
