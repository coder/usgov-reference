# values/env.example.yaml
#
# Full schema of environment-specific values consumed throughout this
# reference deployment. Copy this file, rename it (e.g. env.yaml or
# env.<environment>.yaml), fill in every <PLACEHOLDER>, and source it or
# pass it as --values to the scripts that read it.
#
# IMPORTANT: the filled-in copy MUST NOT be committed to this repository.
# Add it to .gitignore before creating it. The CI identifier-scan gate
# checks that no real identifier ever lands in version control.
#
# Placeholder style: <UPPER_SNAKE_CASE> for required values that callers
# must supply. Optional or computed values carry an inline comment.
#
# -----------------------------------------------------------------------
# 1. AWS account and region
# -----------------------------------------------------------------------

aws:
  # 12-digit AWS account ID (no dashes).
  account_id: "<ACCOUNT_ID>"

  # Primary GovCloud region for EKS, RDS, ECR, and most services.
  # Secondary region (Bedrock only) is declared separately below.
  region: "us-gov-west-1"

  # Named AWS CLI profile to use for the deployment account.
  # Must exist in ~/.aws/config with the appropriate credential source.
  profile: "<AWS_PROFILE>"

  # Commercial AWS profile used only for the Route53 NS delegation step
  # (the parent zone lives in a commercial account).
  commercial_profile: "<AWS_COMMERCIAL_PROFILE>"

# -----------------------------------------------------------------------
# 2. Cluster identity
# -----------------------------------------------------------------------

cluster:
  # Short name for the EKS cluster and the Kubernetes/AWS resource prefix
  # (IAM roles, S3 buckets, DynamoDB tables, SecretManager paths, etc.).
  # Conventionally: <org>-<purpose>, e.g. "myorg-coderdemo".
  name: "<CLUSTER_NAME>"

  # EKS Kubernetes version. Match the value in terraform/variables.tf.
  # Example: "1.30"
  kubernetes_version: "<KUBERNETES_VERSION>"

# -----------------------------------------------------------------------
# 3. DNS and TLS
# -----------------------------------------------------------------------

dns:
  # Fully-qualified base domain for this environment. All service
  # hostnames are subdomains of this value.
  # Example sub-pattern:
  #   dev.<BASE_DOMAIN>     -> Coder control plane
  #   auth.<BASE_DOMAIN>    -> Keycloak
  #   metrics.<BASE_DOMAIN> -> Grafana
  #   gitlab.<BASE_DOMAIN>  -> GitLab
  base_domain: "<BASE_DOMAIN>"

  # Route53 hosted-zone ID for base_domain (already created in the
  # GovCloud account). Retrieve with:
  #   aws route53 list-hosted-zones-by-name --dns-name <BASE_DOMAIN>
  route53_zone_id: "<ROUTE53_ZONE_ID>"

tls:
  # ARN of an ACM certificate that covers <BASE_DOMAIN> and *.<BASE_DOMAIN>.
  # Must be issued (not pending validation) before running the platform layer.
  # Retrieve with:
  #   aws acm list-certificates --region <REGION>
  acm_certificate_arn: "arn:aws-us-gov:acm:<REGION>:<ACCOUNT_ID>:certificate/<ACM_CERT_UUID>"

# -----------------------------------------------------------------------
# 4. Networking (VPC, subnets, security groups)
# -----------------------------------------------------------------------

networking:
  # VPC created by terraform/vpc.tf. Retrieve after `terraform apply`:
  #   terraform -chdir=terraform output -raw vpc_id
  vpc_id: "<VPC_ID>"

  # Three private subnets (one per AZ) for EKS worker nodes and RDS.
  # Retrieve: terraform -chdir=terraform output -json private_subnet_ids
  private_subnet_ids:
    - "<PRIVATE_SUBNET_ID_AZ_A>"
    - "<PRIVATE_SUBNET_ID_AZ_B>"
    - "<PRIVATE_SUBNET_ID_AZ_C>"

  # Security group attached to the EKS-managed node group.
  # Retrieve: terraform -chdir=terraform output -raw node_sg_id
  node_security_group_id: "<NODE_SG_ID>"

  # CIDR block assigned to the VPC. Default: "10.0.0.0/16".
  vpc_cidr: "10.0.0.0/16"

# -----------------------------------------------------------------------
# 5. IRSA IAM role ARNs
# -----------------------------------------------------------------------
#
# Each role is created by terraform/irsa.tf. Retrieve the ARNs with:
#   terraform -chdir=terraform output -json irsa_role_arns
#
# The naming convention is <CLUSTER_NAME>-<purpose>.

irsa:
  # Coder control plane (Bedrock InvokeModel + InvokeModelWithResponseStream).
  bedrock_role_arn: "arn:aws-us-gov:iam::<ACCOUNT_ID>:role/<CLUSTER_NAME>-coder-bedrock"

  # External Secrets Operator (read-only ASM GetSecretValue).
  external_secrets_role_arn: "arn:aws-us-gov:iam::<ACCOUNT_ID>:role/<CLUSTER_NAME>-external-secrets"

  # EBS CSI driver (volume lifecycle).
  ebs_csi_role_arn: "arn:aws-us-gov:iam::<ACCOUNT_ID>:role/<CLUSTER_NAME>-ebs-csi"

  # AWS Load Balancer Controller (NLB/ALB provisioning).
  lbc_role_arn: "arn:aws-us-gov:iam::<ACCOUNT_ID>:role/<CLUSTER_NAME>-lbc"

  # EKS managed node group (EC2, ECR pull, VPC CNI).
  node_role_arn: "arn:aws-us-gov:iam::<ACCOUNT_ID>:role/<CLUSTER_NAME>-node"

# -----------------------------------------------------------------------
# 6. RDS (PostgreSQL)
# -----------------------------------------------------------------------

rds:
  # RDS cluster endpoint (host only, no port). Retrieve after apply:
  #   terraform -chdir=terraform output -raw rds_endpoint
  endpoint: "<RDS_ENDPOINT_HOST>"

  # RDS port (default 5432).
  port: 5432

  # PostgreSQL engine version pinned in terraform/rds.tf.
  postgres_version: "17"

  # RDS instance class.
  instance_class: "db.m6g.large"

# -----------------------------------------------------------------------
# 7. Container registry (ECR)
# -----------------------------------------------------------------------

registry:
  # ECR registry host for the GovCloud account.
  # Pattern: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com
  host: "<ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com"

  # Namespace prefix used when mirroring upstream images into ECR.
  # See scripts/mirror-images.sh for the full mapping.
  # Example: ghcr.io/coder/coder:v2.x -> <ECR_HOST>/ghcr/coder/coder:v2.x
  mirror_prefix: "ghcr"

# -----------------------------------------------------------------------
# 8. AWS Secrets Manager
# -----------------------------------------------------------------------

secrets_manager:
  # Top-level prefix for all secrets in this environment.
  # All paths follow the pattern: <prefix><service>/<key>.
  # Example: myorg-coderdemo/coder/db-password
  prefix: "<CLUSTER_NAME>/"

  # Representative secret paths (for documentation and bootstrap scripts).
  # Real secret values live in AWS Secrets Manager and are never stored here.
  # <PREFIX> below refers to the value of the prefix field above (<CLUSTER_NAME>/).
  paths:
    coder_db_url:        "<PREFIX>coder/db-url"
    coder_oidc_secret:   "<PREFIX>coder/oidc-client-secret"
    coder_ai_key:        "<PREFIX>coder/anthropic-api-key"
    gitlab_root_pw:      "<PREFIX>gitlab/root-password"
    keycloak_admin_pw:   "<PREFIX>keycloak/admin-password"
    grafana_admin_pw:    "<PREFIX>grafana/admin-password"

# -----------------------------------------------------------------------
# 9. Terraform state backend
# -----------------------------------------------------------------------

terraform:
  # S3 bucket for Terraform state (created via bootstrap script, NOT by TF).
  # Naming convention: <CLUSTER_NAME>-tfstate-<ACCOUNT_ID>
  state_bucket: "<CLUSTER_NAME>-tfstate-<ACCOUNT_ID>"

  # DynamoDB table for Terraform state locking.
  lock_table: "<CLUSTER_NAME>-tflock"

# -----------------------------------------------------------------------
# 10. AI / Bedrock
# -----------------------------------------------------------------------

ai:
  # AWS Bedrock cross-region inference profile ID for the primary model.
  # Format: <REGION_PREFIX>.<MODEL_ID>
  # Example: us-gov-west-1.anthropic.claude-3-5-sonnet-20241022-v2:0
  # Available profiles: run `aws bedrock list-inference-profiles --region <REGION>`
  bedrock_inference_profile: "<BEDROCK_INFERENCE_PROFILE>"

  # Secondary Bedrock region used solely for AI services (if different from
  # the primary deployment region).
  # Set to the same value as aws.region if AI services co-locate with EKS.
  bedrock_region: "us-gov-west-1"

# -----------------------------------------------------------------------
# 11. Coder control plane
# -----------------------------------------------------------------------

coder:
  # Chart version. Pin to a specific patch release; see versions.lock.yaml.
  chart_version: "2.34.1"

  # Access URL exposed to end-users (must match dns.base_domain).
  access_url: "https://dev.<BASE_DOMAIN>"

  # Replica count for the Coder Deployment. Use >= 2 for HA.
  replicas: 2

  # Namespace where the control plane is installed.
  namespace: "coder"

  # UUID of the Coder organization that owns workspace templates and AI agents.
  # Retrieve after Coder is running: `coder organizations list` or via the API.
  # Used where Coder resources are attributed to an organization.
  org_uuid: "<CODER_ORG_UUID>"

# -----------------------------------------------------------------------
# 12. Keycloak (identity provider)
# -----------------------------------------------------------------------

keycloak:
  # Version tag of the official Keycloak image (mirrored into ECR).
  version: "26.0"

  # Realm name used for the Coder OIDC client.
  # Example: "coder"
  realm: "<KEYCLOAK_REALM>"

  # Hostname exposed via ingress.
  hostname: "auth.<BASE_DOMAIN>"

# -----------------------------------------------------------------------
# 13. Observability stack
# -----------------------------------------------------------------------

observability:
  # Grafana hostname.
  grafana_hostname: "metrics.<BASE_DOMAIN>"

  # Prometheus scrape interval.
  prometheus_scrape_interval: "30s"

  # Loki S3 bucket for log storage (created by terraform).
  loki_s3_bucket: "<CLUSTER_NAME>-loki"

# -----------------------------------------------------------------------
# 14. GitLab
# -----------------------------------------------------------------------

gitlab:
  # GitLab hostname (EC2-hosted Omnibus).
  hostname: "gitlab.<BASE_DOMAIN>"

  # OAuth application redirect URI for Coder external auth integration.
  # Must match the value configured in GitLab Admin > Applications.
  coder_redirect_uri: "https://dev.<BASE_DOMAIN>/external-auth/gitlab/callback"
